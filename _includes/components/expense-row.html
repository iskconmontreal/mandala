<define-element>
  <expense-row x:object search:string="" showno:boolean="false"
    canapprove:boolean="false" approvedbyme:boolean="false" canpay:boolean="false" needsdoc:boolean="false" busy:boolean="false">
    <template>
      <div class="recent-exp-item row-link" :onclick="e => dispatchEvent(new CustomEvent('view', {detail: x, bubbles: true}))">
        <span class="recent-exp-icon-col">
          <span class="status-icon" :class="'status-' + (x.status || 'submitted')" :html="statusIcon(x.status || 'submitted')"></span>
        </span>
        <div class="recent-exp-main">
          <div class="recent-exp-info">
            <div class="recent-exp-title-row">
              <div class="recent-exp-title">
                <span :html="hl(x?.payee || '\u2014', search || '')"></span>
                <span :if="showno && x.expense_no" class="recent-exp-title-sub dim" :text="'#' + x.expense_no"></span>
              </div>
            </div>
            <div class="recent-exp-meta-row">
              <span class="recent-exp-status-text" :class="'status-' + (x.status || 'submitted')" :text="fmtStatus(x?.status || 'submitted')"></span>
              <span class="recent-exp-time" :text="fmtDate(x?.updated_at || x?.created_at || x?.expense_date)"></span>
            </div>
          </div>
          <div :if="x.attachments?.length" class="row-attachments">
            <img :each="a in (x.attachments || []).slice(0, 4)" :if="a.mime_type?.startsWith('image/')" class="row-attach-thumb" :src="apiBase + '/' + a.file_path" :alt="a.original_name">
            <span :each="a in (x.attachments || []).slice(0, 4)" :if="!a.mime_type?.startsWith('image/')" class="row-attach-file" :title="a.original_name" :html="icon('attach')"></span>
            <span :if="(x.attachments || []).length > 4" class="row-attach-more" :text="'+' + (x.attachments.length - 4)"></span>
          </div>
        </div>
        <span class="recent-exp-actions" :onclick.stop="">
          <button :if="canapprove" type="button" class="btn btn-sm btn-outline" title="Quick approve" aria-label="Quick approve expense" :onclick.stop="e => dispatchEvent(new CustomEvent('approve', {detail: x, bubbles: true}))" :html="approveIcon + ' Approve'"></button>
          <span :if="approvedbyme" class="dim" style="font-size:var(--f-sm)" aria-label="Approved by you">&#x2713; Approved</span>
          <button :if="canpay" type="button" class="btn btn-sm btn-outline btn-ok-outline" title="Mark as paid" aria-label="Mark as paid" :disabled="!x.attachments?.length" :onclick.stop="e => dispatchEvent(new CustomEvent('pay', {detail: x, bubbles: true}))" :html="payIcon + ' Paid'"></button>
          <button :if="needsdoc" type="button" class="btn btn-sm btn-outline" title="Attach document" aria-label="Attach document" :onclick.stop="e => dispatchEvent(new CustomEvent('attach', {detail: x, bubbles: true}))" :html="icon('attach') + ' Attach'"></button>
          <span :if="busy" class="btn btn-sm btn-outline" style="pointer-events:none;color:var(--c-text-dim)">&hellip;</span>
        </span>
        <div class="recent-exp-cat">
          <span :if="x.attachments?.length" class="recent-exp-attach" :title="x.attachments.length + ' document' + (x.attachments.length > 1 ? 's' : '')">
            <span class="recent-exp-attach-icon" :html="icon('attach')"></span>
            <span :if="x.attachments.length > 1" class="recent-exp-attach-count" :text="x.attachments.length"></span>
          </span>
          <span class="badge" :class="catCls(x.category || 'other')" :text="fmtCat(x.category || 'other')"></span>
        </div>
        <div class="recent-exp-amount">
          <div class="recent-exp-value stat-err" :text="'-$' + fmtAmt(x.amount || 0)"></div>
        </div>
      </div>
    </template>
  </expense-row>
</define-element>
