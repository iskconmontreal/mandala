---
preloads:
  - /lib/icons.js
---
<div class="page-header">
  <h1>Camera</h1>
  <p class="dim">Live camera control</p>
</div>

<div :if="loading" class="section-loader"><img src="/assets/preloader.svg"></div>

<div :if="!loading && status !== 'ok'" class="card">
  <div class="card-header">
    <h3>Status</h3>
    <span :if="status === 'unreachable'" class="badge badge-warn">Offline</span>
    <span :if="status === 'not_configured'" class="badge badge-dim">Not configured</span>
  </div>
  <p class="dim" style="font-size:var(--f-sm)" :text="url || 'No URL configured'"></p>
</div>

<div :if="!loading && status === 'ok'" class="av-frame-wrap">
  <iframe :src="BASE + '/api/proxy/camera/'" class="av-frame"></iframe>
</div>

<style>
  .av-frame-wrap {
    width: 100%;
    height: calc(100vh - 180px);
    min-height: 400px;
    border-radius: var(--r-lg);
    overflow: hidden;
    border: 1px solid var(--c-border);
  }
  .av-frame {
    width: 100%;
    height: 100%;
    border: 0;
  }
  .badge-warn { background: var(--c-warn-bg); color: var(--c-warn); }
  .badge-dim { background: var(--c-surface); color: var(--c-text-dim); }
</style>

<script type="module">
  import { init } from 'lib/app.js'
  import { api, BASE } from 'lib/api.js'

  const s = init({
    BASE,
    loading: true,
    status: 'not_configured',
    url: '',
  })

  api.getProxyStatus()
    .then(st => {
      s.status = st?.camera?.status || 'not_configured'
      s.url = st?.camera?.url || ''
      s.loading = false
    })
    .catch(() => { s.loading = false })
</script>
