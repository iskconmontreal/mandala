---
---
<div class="page-header">
  <h1 :text="'Hare Krishna, ' + ([user?.meta?.first_name, user?.meta?.last_name].filter(Boolean).join(' ') || user?.email?.split('@')[0] || 'Prabhu') + '!'"></h1>
  <p :text="_greeting"></p>
</div>

<!-- Financial pulse (admin only) -->
<div :if="can('donations:view') || can('expenses:view')" class="card" style="margin-bottom:var(--s-xl)">
  <div class="card-header">
    <h3>Finance</h3>
    <a href="finance/" class="btn-link" style="color:var(--c-accent)">View details →</a>
  </div>
  <div :if="finLoading" class="section-loader"><img src="/assets/preloader.svg"></div>
  <div :if="!finLoading" style="display:flex; gap:var(--s-xl); flex-wrap:wrap">
    <div>
      <div class="stat-label stat-ok">Donations this month</div>
      <div class="stat-value" :text="'$' + fmtAmt(fin.donations)"></div>
    </div>
    <div>
      <div class="stat-label stat-err">Expenses this month</div>
      <div class="stat-value" :text="'$' + fmtAmt(fin.expenses)"></div>
    </div>
    <div>
      <div class="stat-label" :text="fin.net >= 0 ? 'Surplus' : 'Deficit'"></div>
      <div class="stat-value" :class="fin.net >= 0 ? 'stat-ok' : 'stat-err'"
        :text="'$' + fmtAmt(Math.abs(fin.net))"></div>
    </div>
  </div>
  <div :if="!finLoading" class="ratio-bar" style="margin-top:var(--s-lg)">
    <span :style="{width: fin.donPct + '%', background: 'var(--c-ok)'}"></span>
    <span :style="{width: fin.expPct + '%', background: 'var(--c-err)'}"></span>
  </div>
  <div :if="!finLoading" style="display:flex; justify-content:space-between; font-size:var(--f-sm); color:var(--c-text-dim)">
    <span :text="'Donations ' + fin.donPct + '%'"></span>
    <span :text="'Expenses ' + fin.expPct + '%'"></span>
  </div>
</div>

<!-- Recent Activity -->
<div class="card" style="margin-bottom:var(--s-xl)">
  <div class="card-header">
    <h3>Recent Activity</h3>
  </div>
  <div :if="activity.length" class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Description</th>
          <th style="text-align:right">Amount</th>
        </tr>
      </thead>
      <tbody>
        <tr :each="a in activity">
          <td :text="a.date"></td>
          <td><span class="badge" :text="fmtCat(a.type)"></span></td>
          <td :text="a.desc"></td>
          <td style="text-align:right" :text="a.amount ? '$' + fmtAmt(a.amount) : '—'"></td>
        </tr>
      </tbody>
    </table>
  </div>
  <div :if="!activity.length" class="dim" style="font-size:var(--f-sm); padding:var(--s-sm) 0">No recent activity</div>
</div>

<!-- Members pulse (admin only) -->
<div :if="can('clients:view')" class="card" style="margin-bottom:var(--s-xl)">
  <div class="card-header">
    <h3>Members</h3>
    <a href="members/" class="btn-link" style="color:var(--c-accent)">View all →</a>
  </div>
  <div :if="memLoading" class="section-loader"><img src="/assets/preloader.svg"></div>
  <div :if="!memLoading" style="display:flex; gap:var(--s-xl); flex-wrap:wrap">
    <div>
      <div class="stat-label">Total members</div>
      <div class="stat-value" :text="members.total"></div>
    </div>
  </div>
</div>

<!-- My Giving -->
<div :if="!can('clients:view')" class="card" style="margin-bottom:var(--s-xl)">
  <div class="card-header">
    <h3>My Giving</h3>
  </div>
  <div :if="giving.total" style="display:flex; gap:var(--s-xl); flex-wrap:wrap">
    <div>
      <div class="stat-label stat-ok">Donated this year</div>
      <div class="stat-value stat-ok" :text="'$' + fmtAmt(giving.total)"></div>
      <div class="stat-sub dim" :text="giving.count + ' donations'"></div>
    </div>
  </div>
  <div :if="!giving.total && !giving.receipts.length" class="dim" style="font-size:var(--f-sm); padding:var(--s-sm) 0">No donations yet this year</div>
  <div :if="Object.keys(giving.byCategory).length" style="margin-top:var(--s-md)">
    <div class="stat-label" style="margin-bottom:var(--s-xs)">By category</div>
    <div :each="[cat, amt] in Object.entries(giving.byCategory)" style="display:flex;justify-content:space-between;font-size:var(--f-sm);padding:var(--s-xs) 0">
      <span :text="fmtCat(cat)"></span>
      <span class="dim" :text="'$' + fmtAmt(amt)"></span>
    </div>
  </div>
  <div :if="giving.receipts.length" style="margin-top:var(--s-md)">
    <div class="stat-label" style="margin-bottom:var(--s-xs)">Tax Receipts</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Receipt #</th>
            <th>Year</th>
            <th style="text-align:right">Eligible</th>
            <th>Issued</th>
          </tr>
        </thead>
        <tbody>
          <tr :each="r in giving.receipts">
            <td :text="r.receipt_no"></td>
            <td :text="r.fiscal_year"></td>
            <td style="text-align:right" class="stat-ok" :text="'$' + fmtAmt(r.eligible_amount)"></td>
            <td :text="r.date_issued?.slice(0,10) || '—'"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>


<script type="module">
  import { init, fmtAmt, fmtCat, auth } from '../lib/app.js'
  import { api } from '../lib/api.js'
  import { greeting } from '../lib/greeting.js'

  const now = new Date()
  const y = now.getFullYear()
  const m = String(now.getMonth() + 1).padStart(2, '0')
  const monthStart = `${y}-${m}-01`
  const monthEnd = `${y}-${m}-31`

  const prev = +localStorage.getItem('mandala_last_visit') || 0
  localStorage.setItem('mandala_last_visit', Date.now())
  const vis = prev ? (Date.now() - prev) / 3600000 : Infinity

  const s = init({
    _greeting: greeting(now, vis),
    fin: { donations: 0, expenses: 0, net: 0, donPct: 0, expPct: 0 },
    finLoading: true,
    members: { total: 0 },
    memLoading: true,
    giving: { total: 0, count: 0, byCategory: {}, receipts: [] },
    activity: [],
    fmtAmt,
    fmtCat,
  })

  const hasFin = s.can('donations:view') || s.can('expenses:view')
  const hasMem = s.can('clients:view')

  if (hasFin || hasMem) {
    const calls = [
      hasFin ? api.getDonations({ limit: 500, dateFrom: monthStart, dateTo: monthEnd }) : null,
      hasFin ? api.getExpenses({ limit: 500, dateFrom: monthStart, dateTo: monthEnd }) : null,
      hasMem ? api.getMembers({ limit: 1 }) : null,
    ]
    Promise.all(calls).then(([don, exp, mem]) => {
      if (don && exp) {
        const donAmt = (don.items || []).reduce((s, d) => s + (d.amount || 0), 0)
        const expAmt = (exp.items || []).reduce((s, x) => s + (x.amount || 0), 0)
        const gross = donAmt + expAmt || 1
        s.fin = {
          donations: donAmt, expenses: expAmt, net: donAmt - expAmt,
          donPct: Math.round(donAmt / gross * 100),
          expPct: Math.round(expAmt / gross * 100),
        }
        s.finLoading = false
      }
      if (mem) {
        s.members = { total: mem.total || 0 }
        s.memLoading = false
      }
    }).catch(() => { s.finLoading = false; s.memLoading = false })
  } else {
    s.finLoading = false
    s.memLoading = false
  }

  Promise.all([
    api.getMyDonationSummary(y).catch(() => null),
    api.getMyTaxReceipts().catch(() => null),
  ]).then(([summary, receipts]) => {
    if (!summary && !receipts) return
    const byCat = {}
    if (summary?.by_category) {
      for (const [k, v] of Object.entries(summary.by_category)) byCat[k] = v
    }
    s.giving = {
      total: summary?.total || 0,
      count: summary?.count || 0,
      byCategory: byCat,
      receipts: receipts?.items || receipts || [],
    }
  }).catch(() => {})

  if (hasFin) {
    api.getAuditLogs({ limit: 15, sortBy: 'created_at', sortDesc: 'true' })
      .then(res => {
        s.activity = (res.items || []).map(a => ({
          date: a.created_at?.slice(0, 10) || '—',
          type: a.action || a.entity_type || '—',
          desc: [a.entity_type, '#' + a.entity_id, a.action].filter(Boolean).join(' '),
          amount: a.diff?.amount,
        }))
      }).catch(() => {})
  } else {
    api.getMyDonations({ limit: 10, sortBy: 'created_at', sortDesc: 'true' })
      .then(res => {
        s.activity = (res.items || []).map(d => ({
          date: d.donation_date?.slice(0, 10) || d.created_at?.slice(0, 10) || '—',
          type: 'donation',
          desc: fmtCat(d.category),
          amount: d.amount,
        }))
      }).catch(() => {})
  }
</script>
