<input id="don-receipt-input" type="file" accept="image/*,.pdf" style="display:none"
  :onchange="e => { scanFile(e.target.files[0]); e.target.value = '' }">

<div class="field autocomplete">
  <label>Donor</label>
  <div style="position:relative">
    <input id="don-donor" type="text" :value="memberQuery"
      :onfocus="e => filterDonors(memberQuery)"
      :oninput="e => { donForm.member_id = null; filterDonors(e.target.value) }"
      :onblur="e => { memberHits = [] }"
      :style="donForm.member_id ? 'padding-right:2rem' : ''"
      placeholder="Anonymous">
    <button :if="donForm.member_id" type="button" class="btn-link"
      style="position:absolute;right:.5rem;top:50%;transform:translateY(-50%)"
      :onclick="clearDonor()">&times;</button>
  </div>
  <div :if="memberHits.length" class="autocomplete-list">
    <div class="autocomplete-item" :each="m in memberHits" :onmousedown.prevent="selectDonor(m)" :text="m.name"></div>
  </div>
</div>
<div class="form-row">
  <div class="field" :if="location.pathname.includes('/app/finance')">
    <label for="don-type">Type</label>
    <select id="don-type" :oninput="e => { donForm.type = e.target.value; if (e.target.value !== 'donation') donForm.category = ''; else if (!donForm.category) donForm.category = 'general' }" :onchange="e => { donForm.type = e.target.value; if (e.target.value !== 'donation') donForm.category = ''; else if (!donForm.category) donForm.category = 'general' }">
      <option :each="t in incomeTypes" :value="t" :selected="donForm.type === t" :text="fmt(t)"></option>
    </select>
  </div>
  <div class="field">
    <label for="don-amount">Amount ($)</label>
    <input id="don-amount" type="text" inputmode="decimal" pattern="[0-9]*\.?[0-9]*" :value="donForm.amount" :oninput="e => syncDonAmount(e)" placeholder="0.00" required>
  </div>
  <div class="field">
    <label for="don-method">Method</label>
    <select id="don-method" :oninput="e => donForm.method = e.target.value" :onchange="e => donForm.method = e.target.value">
      <option :each="m in donMethods" :value="m" :selected="donForm.method === m" :text="fmt(m)"></option>
    </select>
  </div>
</div>
<div class="field">
  <label for="don-note">Note</label>
  <textarea id="don-note" rows="1" style="field-sizing:content;resize:none"
    :value="donForm.note"
    :oninput="e => donForm.note = e.target.value"
    placeholder="Optional…"></textarea>
</div>

<div :if="can('income:create')" class="form-row">
  <div class="field">
    <label for="don-cat">Category</label>
    <select id="don-cat" :disabled="donForm.type !== 'donation'" :oninput="e => donForm.category = e.target.value" :onchange="e => donForm.category = e.target.value">
      <option value="general" :selected="donForm.category === 'general'" :text="fmt('general')"></option>
      <option value="sunday_feast" :selected="donForm.category === 'sunday_feast'" :text="fmt('sunday_feast')"></option>
      <option value="book_distribution" :selected="donForm.category === 'book_distribution'" :text="fmt('book_distribution')"></option>
      <option value="deity_worship" :selected="donForm.category === 'deity_worship'" :text="fmt('deity_worship')"></option>
      <option value="building_fund" :selected="donForm.category === 'building_fund'" :text="fmt('building_fund')"></option>
      <option value="annadana" :selected="donForm.category === 'annadana'" :text="fmt('annadana')"></option>
      <option value="festival" :selected="donForm.category === 'festival'" :text="fmt('festival')"></option>
      <option value="events" :selected="donForm.category === 'events'" :text="fmt('events')"></option>
      <option value="other" :selected="donForm.category === 'other'" :text="fmt('other')"></option>
    </select>
  </div>
  <div class="field">
    <label for="don-date">Date</label>
    <input id="don-date" type="date" :value="donForm.date_received" :oninput="e => donForm.date_received = e.target.value">
  </div>
</div>

<div :if="!editId" class="attach-row">
  <a :if="!receiptName && !extracting" href="#" class="dim attach-link"
    :onclick.prevent="document.getElementById('don-receipt-input').click()"
    :ondragover.prevent=""
    :ondrop="e => { e.preventDefault(); scanFile(e.dataTransfer.files[0]) }">
    <span :html="icon('attach')"></span>
    Attach image / cheque
  </a>
  <span :if="extracting" class="dim" style="font-size:var(--f-sm)">Scanning…</span>
  <span :if="receiptName && !extracting" class="attach-badge">
    <img :if="receiptPreview" :src="receiptPreview" class="attach-thumb">
    <span :text="receiptName" style="font-size:var(--f-sm)"></span>
    <a href="#" class="dim" style="font-size:var(--f-sm)" :onclick.prevent="document.getElementById('don-receipt-input').click()">change</a>
  </span>
</div>
