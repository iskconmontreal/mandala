<div class="recent-inc-item row-link{% if include.row_class %} {{ include.row_class }}{% endif %}" :class="{'row-fresh': isFresh(d.id)}" :onclick="{% if include.onclick %}{{ include.onclick }}{% else %}viewDonation(d){% endif %}">
  <span class="recent-inc-icon-col" :class="'recent-inc-icon-' + recentIncMethod(d)">
    <span class="recent-inc-icon" :html="methodIcon(recentIncMethod(d))"></span>
  </span>
  <div class="recent-inc-main">
    <div class="recent-inc-info">
      <div class="recent-inc-title-row">
        <div style="display:flex;align-items:baseline;gap:var(--s-xs);flex-wrap:wrap">
          {% if include.search %}
          <div class="recent-inc-title" :html="hl(recentIncSource(d), {{ include.search }})"></div>
          {% else %}
          <div class="recent-inc-title" :text="recentIncSource(d)"></div>
          {% endif %}
          {% if include.show_id %}<span class="recent-inc-title-sub dim" :if="d.id" :text="'#' + d.id"></span>{% endif %}
        </div>
      </div>
      <div class="recent-inc-subtitle">
        <span class="recent-inc-method" :class="'recent-inc-method-' + recentIncMethod(d)" :text="recentIncMethod(d)"></span>
        <span class="recent-inc-time" :text="fmtDate(changedAt(d) || d.created_at || d.date_received)"></span>
      </div>
    </div>
    <div :if="d.attachments?.length" class="row-attachments">
      <img :each="a in (d.attachments || []).slice(0, 4)" :if="a.mime_type?.startsWith('image/')" class="row-attach-thumb" :src="apiBase + '/' + a.file_path" :alt="a.original_name">
      <span :each="a in (d.attachments || []).slice(0, 4)" :if="!a.mime_type?.startsWith('image/')" class="row-attach-file" :title="a.original_name" :html="icon('attach')"></span>
      <span :if="(d.attachments || []).length > 4" class="row-attach-more" :text="'+' + (d.attachments.length - 4)"></span>
    </div>
  </div>
  <span class="recent-inc-actions" :onclick.stop="">
    {% if include.show_actions %}
    <button type="button" class="btn btn-sm btn-outline" title="Quick receipt" aria-label="Quick receipt" :onclick.stop="printDonation(d)" :html="printIcon + ' Print'"></button>
    {% endif %}
  </span>
  <div class="recent-inc-type">
    <span class="badge" :class="catCls(recentIncKind(d))" :text="fmtCat(recentIncKind(d))"></span>
  </div>
  <div class="recent-inc-amount">
    <div class="recent-inc-value stat-ok" :text="'+$' + fmtAmt(d.amount || 0)"></div>
  </div>
</div>
