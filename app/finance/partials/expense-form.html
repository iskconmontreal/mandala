<!-- Expense modal (add/edit/detail) -->
<div class="modal-overlay" :if="showAdd && activeTab === 'expenses'" :onkeydown.esc.document="showAdd = false" :onclick="e => { if (e.target === e.currentTarget) showAdd = false }">
  <div class="modal">
    <div class="modal-header">
      <h2 :if="!detailExp" :text="editId ? 'Edit Expense' : 'Add Expense'"></h2>
      <h2 :if="detailExp" style="display:flex;align-items:center;gap:var(--s-sm)">
        <span :text="detailExp?.expense_no || 'Expense'"></span>
        <span class="badge" :class="'badge-' + detailExp?.status" :text="fmt(detailExp?.status)"></span>
      </h2>
      <button class="modal-close" :onclick="showAdd = false">&times;</button>
    </div>
    <div class="modal-body">

      <!-- ===== DETAIL MODE (non-editable states) ===== -->
      <div :if="detailExp && !expEditable" style="display:flex;flex-direction:column;gap:var(--s-md)">
        <div class="detail-grid">
          <div class="detail-field">
            <div class="stat-label">Type</div>
            <div :text="fmt(detailExp?.type || 'direct')"></div>
          </div>
          <div class="detail-field">
            <div class="stat-label">Amount</div>
            <div :text="'$' + fmtAmt(detailExp?.amount)"></div>
          </div>
          <div class="detail-field" :if="detailExp?.tax_amount">
            <div class="stat-label">Tax</div>
            <div :text="'$' + fmtAmt(detailExp?.tax_amount)"></div>
          </div>
          <div class="detail-field" :if="detailExp?.actual_amount && detailExp?.actual_amount !== detailExp?.amount">
            <div class="stat-label">Actual Amount</div>
            <div :text="'$' + fmtAmt(detailExp?.actual_amount)"></div>
          </div>
          <div class="detail-field">
            <div class="stat-label">Paid to</div>
            <div :text="detailExp?.client_id ? (memberNames[detailExp?.client_id] || detailExp?.paid_to) : detailExp?.paid_to"></div>
          </div>
          <div class="detail-field">
            <div class="stat-label">Category</div>
            <div :text="fmt(detailExp?.category)"></div>
          </div>
          <div class="detail-field">
            <div class="stat-label">Date</div>
            <div :text="detailExp?.expense_date?.slice(0,10) || '—'"></div>
          </div>
          <div class="detail-field" :if="detailExp?.bank_ref">
            <div class="stat-label">Bank Ref</div>
            <div :text="detailExp?.bank_ref"></div>
          </div>
        </div>
        <div :if="detailExp?.description">
          <div class="stat-label">Description</div>
          <div :text="detailExp?.description"></div>
        </div>

        <!-- Approval chain -->
        <div :if="expApprovals.length">
          <div class="stat-label" style="margin-bottom:var(--s-sm)">Approvals</div>
          <div class="history-list">
            <div class="history-item" :each="a in expApprovals">
              <span class="badge" :class="'badge-' + a.action" :text="fmt(a.action)"></span>
              <span :text="memberNames[a.approved_by] || 'User #' + a.approved_by"></span>
              <span :if="a.note" class="dim" :text="'— ' + a.note"></span>
              <span class="history-date" :text="a.created_at?.slice(0,10) || ''"></span>
            </div>
          </div>
        </div>

        <!-- Workflow actions -->
        <div class="login-error" :if="addErr" :text="addErr"></div>

        <div :if="detailExp?.status === 'submitted' && can('expenses:approve')" class="action-section">
          <div class="field">
            <label>Note</label>
            <textarea rows="2" :value="actionNote" :oninput="e => actionNote = e.target.value" placeholder="Optional note for approval…"></textarea>
          </div>
          <div class="action-row">
            <button class="btn btn-primary btn-sm" :class="{'btn-loading': actioning}" :onclick="approveExp()">Approve</button>
            <button class="btn btn-outline btn-sm" :class="{'btn-loading': actioning}" :onclick="returnExp()">Return</button>
            <button class="btn btn-danger btn-sm" :class="{'btn-loading': actioning}" :onclick="rejectExp()">Reject</button>
          </div>
        </div>

        <div :if="detailExp?.status === 'approved' && can('expenses:approve')" class="action-section">
          <div class="field">
            <label>Bank Reference</label>
            <input type="text" :value="actionRef" :oninput="e => actionRef = e.target.value" placeholder="e-Transfer ref, cheque #…">
          </div>
          <div class="action-row">
            <button class="btn btn-primary btn-sm" :class="{'btn-loading': actioning}" :onclick="payExp()">Mark Paid</button>
          </div>
        </div>

        <div :if="detailExp?.status === 'paid' && detailExp?.type === 'advance'" class="action-section">
          <div class="field">
            <label>Actual Amount ($)</label>
            <input type="number" step="0.01" min="0.01" :value="actionAmt" :oninput="e => actionAmt = e.target.value" placeholder="0.00">
          </div>
          <div class="action-row">
            <button class="btn btn-primary btn-sm" :class="{'btn-loading': actioning}" :onclick="reconcileExp()">Reconcile</button>
          </div>
        </div>

        <div :if="detailExp?.status === 'paid' && can('expenses:approve')" class="action-section">
          <div class="field">
            <label>Bank Reference</label>
            <input type="text" :value="actionRef" :oninput="e => actionRef = e.target.value" placeholder="e-Transfer ref, cheque #…">
          </div>
          <div class="action-row">
            <button class="btn btn-primary btn-sm" :class="{'btn-loading': actioning}" :onclick="closeExp()">Close</button>
          </div>
        </div>

        <!-- History -->
        <div :if="expHistory.length">
          <div class="stat-label" style="margin-bottom:var(--s-sm)">History</div>
          <div class="history-list">
            <div class="history-item" :each="h in expHistory">
              <span class="badge" :class="'badge-' + (h.action || '').split('_')[0]" :text="fmt(h.action)"></span>
              <span class="dim" :if="h.diff" :text="typeof h.diff === 'string' ? h.diff : Object.keys(h.diff).join(', ')"></span>
              <span class="history-date" :text="h.created_at?.slice(0,10) || ''"></span>
            </div>
          </div>
        </div>

        <div style="display:flex; justify-content:flex-end">
          <button class="btn btn-outline" :onclick="showAdd = false">Close</button>
        </div>
      </div>

      <!-- ===== EDIT MODE (draft/returned/new) ===== -->
      <div :if="!detailExp || expEditable" style="display:flex;flex-direction:column;gap:var(--s-md)">
        <div :if="!editId" class="receipt-strip"
          :ondragover="e => e.preventDefault()"
          :ondrop="e => { e.preventDefault(); addReceipts(e.dataTransfer.files) }">
          <div :if="!receipts.length" style="flex:1;text-align:center;cursor:pointer"
            :onclick="document.getElementById('receipt-input').click()">
            <div class="scan-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="3" x2="9" y2="9"/><circle cx="14" cy="15" r="2.5"/><path d="M16 17l2.5 2.5"/>
              </svg>
            </div>
            <div style="font-weight:var(--f-wt-b)">Scan receipts</div>
            <div class="scan-hint">Drop images or PDFs, or click to browse</div>
          </div>
          <div :each="r in receipts" class="receipt-thumb" :class="{ 'receipt-extracting': r.extracting, 'receipt-error': r.err }"
            :onclick="e => { if (!e.target.closest('.receipt-remove') && r.preview) lightboxSrc = r.preview }">
            <img :if="r.preview" :src="r.preview">
            <div :if="!r.preview" class="receipt-placeholder" :text="r.name?.split('.').pop()?.toUpperCase() || 'FILE'"></div>
            <div :if="r.data?.amount" class="receipt-amount" :text="'$' + r.data.amount"></div>
            <div :if="r.extracting" class="receipt-spinner"></div>
            <button type="button" class="receipt-remove" :onclick="removeReceipt(r)">&times;</button>
          </div>
          <div :if="receipts.length" class="receipt-add"
            :onclick="document.getElementById('receipt-input').click()">+</div>
        </div>
        <input id="receipt-input" type="file" accept="image/*,.pdf" multiple style="display:none"
          :onchange="e => { addReceipts(e.target.files); e.target.value = '' }">

        <div :if="!editId" class="tab-row exp-type-tabs">
          <div class="tab" :class="{'tab-active': expForm.type === 'direct'}"
            :onclick="() => { expForm.type = 'direct'; clearExpMember() }">Direct</div>
          <div class="tab" :class="{'tab-active': expForm.type === 'reimbursement'}"
            :onclick="() => expForm.type = 'reimbursement'">Reimbursement</div>
          <div class="tab" :class="{'tab-active': expForm.type === 'advance'}"
            :onclick="() => expForm.type = 'advance'">Advance</div>
        </div>
        <div :if="editId" class="dim" style="font-size:var(--f-sm)" :text="fmt(expForm.type)"></div>

        <form :onsubmit.prevent="saveExpense" style="display:flex;flex-direction:column;gap:var(--s-md)">
          <div class="form-row">
            <div :if="expForm.type === 'direct'" class="field autocomplete">
              <label for="exp-vendor">Paid to</label>
              <input id="exp-vendor" type="text" :value="expForm.paid_to"
                :oninput="e => filterVendors(e.target.value)"
                :onblur="e => { vendorHits = [] }"
                placeholder="Vendor, store…" required>
              <div :if="vendorHits.length" class="autocomplete-list">
                <div class="autocomplete-item" :each="v in vendorHits" :onmousedown.prevent="() => { expForm.paid_to = v; vendorHits = [] }" :text="v"></div>
              </div>
            </div>
            <div :if="expForm.type !== 'direct'" class="field autocomplete">
              <label>Member</label>
              <input type="text" :value="memberQuery"
                :oninput="e => filterMembers(e.target.value)"
                :onfocus="e => filterMembers(e.target.value)"
                :onblur="e => { memberHits = [] }"
                placeholder="Search member…" required>
              <div :if="memberHits.length" class="autocomplete-list">
                <div class="autocomplete-item" :each="m in memberHits" :onmousedown.prevent="() => selectExpMember(m)" :text="m.name"></div>
              </div>
            </div>
            <div class="field">
              <label for="exp-cat">Category</label>
              <select id="exp-cat" :value="expForm.category" :onchange="e => expForm.category = e.target.value">
                <option :each="c in expCats" :value="c" :text="fmt(c)"></option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="field">
              <label for="exp-amount">Amount ($)</label>
              <input id="exp-amount" type="number" :value="expForm.amount" :oninput="e => expForm.amount = e.target.value" step="0.01" min="0.01" placeholder="0.01" required>
            </div>
            <div class="field">
              <label for="exp-date">Date</label>
              <input id="exp-date" type="date" :value="expForm.expense_date" :oninput="e => expForm.expense_date = e.target.value" required>
            </div>
          </div>
          <div class="field">
            <label for="exp-desc">Description</label>
            <textarea id="exp-desc" rows="1" :value="expForm.description" :oninput="e => expForm.description = e.target.value" placeholder="Optional…"></textarea>
          </div>

          <div class="login-error" :if="addErr" :text="addErr"></div>

          <div style="display:flex; justify-content:flex-end; gap:var(--s-sm)">
            <button :if="editId && (!detailExp || detailExp?.status === 'draft') && !delConfirm" type="button" class="btn btn-danger btn-sm" style="margin-right:auto" :onclick="delConfirm = true">Delete</button>
            <span :if="delConfirm" class="dim" style="font-size:var(--f-sm); margin-right:auto; align-self:center">Delete permanently?</span>
            <button :if="delConfirm" type="button" class="btn btn-danger btn-sm" :class="{'btn-loading': adding}" :onclick="delExpense()">Yes</button>
            <button :if="delConfirm" type="button" class="btn btn-outline btn-sm" :onclick="delConfirm = false">No</button>
            <button :if="editId && detailExp && (detailExp?.status === 'draft' || detailExp?.status === 'returned') && !delConfirm" type="button" class="btn btn-outline btn-sm" :class="{'btn-loading': actioning}" :onclick="submitExp()">Submit for Approval</button>
            <button :if="!delConfirm" type="button" class="btn btn-outline" :onclick="cancelAdd()">Cancel</button>
            <button :if="!delConfirm" type="submit" class="btn btn-primary" :class="{'btn-loading': adding}" :text="editId ? 'Update' : 'Save Expense'"></button>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
<div :if="lightboxSrc" class="lightbox" :onclick="lightboxSrc = ''" :onkeydown.esc.document="lightboxSrc = ''">
  <img :src="lightboxSrc">
  <button class="lightbox-close" :onclick="lightboxSrc = ''">&times;</button>
</div>
